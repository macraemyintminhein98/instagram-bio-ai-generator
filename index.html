<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGenie - AI Instagram Bio Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 20px; background-color: #f7fafc; color: #2d3748; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        h1 { color: #4299e1; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: calc(100% - 20px); padding: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }
        button { background-color: #4299e1; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; transition: background-color 0.2s; }
        button:hover { background-color: #3182ce; }
        #output { margin-top: 25px; padding: 15px; background-color: #e6fffa; border: 1px solid #b2f5ea; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; font-size: 0.9em; }
        #price { text-align: center; margin-top: 20px; font-size: 1.1em; font-weight: 600; color: #2b6cb0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BioGenie ✨</h1>
        <p style="text-align:center; margin-bottom:25px;">Craft your perfect Instagram bio instantly with AI.</p>
        <form id="bioForm">
            <label for="interests">Interests/Keywords:</label>
            <input type="text" id="interests" placeholder="e.g., tech, travel, coding, art" required>

            <label for="profession">Profession/Role:</label>
            <input type="text" id="profession" placeholder="e.g., marketer, student, barista">

            <label for="mood">Mood/Style:</label>
            <select id="mood">
                <option value="professional">Professional</option>
                <option value="funny">Funny</option>
                <option value="inspirational">Inspirational</option>
                <option value="quirky">Quirky</option>
                <option value="minimalist">Minimalist</option>
            </select>

            <label for="cta">Call to Action (Optional):</label>
            <input type="text" id="cta" placeholder="e.g., DM for collabs, Link in bio">

            <div id="price">Generate your custom bio for just $2.99!</div>
            <button type="submit" id="generateBtn">Generate Bio</button>
        </form>
        <div id="output" style="display:none;"></div>
    </div>
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('YOUR_STRIPE_PUBLIC_KEY'); // Replace with your actual public key
        const bioForm = document.getElementById('bioForm');
        const generateBtn = document.getElementById('generateBtn');
        const outputDiv = document.getElementById('output');

        bioForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            generateBtn.disabled = true;
            generateBtn.textContent = 'Processing...';

            const interests = document.getElementById('interests').value;
            const profession = document.getElementById('profession').value;
            const mood = document.getElementById('mood').value;
            const cta = document.getElementById('cta').value;

            // In a real application, you'd send these values to your serverless function.
            // The serverless function would then handle the LLM call and Stripe Checkout session creation.
            // For this example, we'll simulate the payment redirect.

            // --- Simulate Stripe Checkout initiation ---
            // Replace this with an actual API call to your backend to create a Stripe Checkout Session
            try {
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ interests, profession, mood, cta })
                });
                const session = await response.json();

                const result = await stripe.redirectToCheckout({
                    sessionId: session.id,
                });

                if (result.error) {
                    alert(result.error.message);
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Generate Bio';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to initiate checkout. Please try again.');
                generateBtn.disabled = false;
                generateBtn.textContent = 'Generate Bio';
            }
            // --- End Simulate Stripe Checkout initiation ---

            // On successful payment (handled via Stripe webhooks or redirect_url)
            // you would call your LLM and display the result.
            // Example: outputDiv.textContent = 'Your awesome bio is here!'; outputDiv.style.display = 'block';
        });
    </script>
</body>
</html>
